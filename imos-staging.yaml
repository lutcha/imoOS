databases:
  - engine: PG
    name: db
    version: "15"
  - cluster_name: imos-redis-staging
    engine: VALKEY
    name: redis
    production: true
domains:
  - domain: imos-staging-jiow3.ondigitalocean.app
    type: PRIMARY
  - domain: proptech.cv
    type: ALIAS
  - domain: www.proptech.cv
    type: ALIAS
  - domain: demo.proptech.cv
    type: ALIAS
ingress:
  rules:
    - component:
        name: frontend
      match:
        path:
          prefix: /
    - component:
        name: api
      match:
        path:
          prefix: /api
jobs:
  - dockerfile_path: docker/Dockerfile.staging
    envs:
      - key: DJANGO_SETTINGS_MODULE
        scope: RUN_AND_BUILD_TIME
        value: config.settings.staging
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:/6Nvv0DGA5KvPG+EF1vXGMJ8x3xHzwAA:rf1aY1YBVpOss4wRn+nbSMWUityYwr8vWinh1k0=]
      - key: DB_NAME
        scope: RUN_AND_BUILD_TIME
        value: ${db.DATABASE}
      - key: DB_USER
        scope: RUN_AND_BUILD_TIME
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:7CTugN49f1CVPewvpo5IwiwUuBmVL5xy:iHo3Z4arA4MNEgbwlfi9WVrLT7L4FyzMUDyZP9Ps]
      - key: DB_HOST
        scope: RUN_AND_BUILD_TIME
        value: ${db.HOSTNAME}
      - key: DB_PORT
        scope: RUN_AND_BUILD_TIME
        value: ${db.PORT}
      - key: ALLOWED_HOSTS
        scope: RUN_AND_BUILD_TIME
        value: "*"
      - key: TENANT_BASE_DOMAIN
        scope: RUN_AND_BUILD_TIME
        value: imos-staging-jiow3.ondigitalocean.app
      - key: CORS_ALLOWED_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: https://imos-staging-jiow3.ondigitalocean.app,https://proptech.cv,https://www.proptech.cv,https://demo.proptech.cv
      - key: APP_DOMAIN
        scope: RUN_AND_BUILD_TIME
        value: ${APP_DOMAIN}
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        value: ${redis.DATABASE_URL}?ssl_cert_reqs=CERT_NONE
      - key: TWILIO_ACCOUNT_SID
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:placeholder:AC_placeholder]
      - key: TWILIO_AUTH_TOKEN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:placeholder:placeholder]
      - key: TWILIO_WHATSAPP_NUMBER
        scope: RUN_AND_BUILD_TIME
        value: "+14155238886"
      - key: WHATSAPP_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:placeholder:webhook_secret_placeholder]
      - key: SETUP_SECRET_TOKEN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: EV[1:placeholder:imos-setup-2026]
    github:
      branch: develop
      repo: lutcha/imoOS
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    kind: PRE_DEPLOY
    name: migrate
    run_command:
      bash -c 'python manage.py migrate_schemas --shared && 
      python manage.py migrate_schemas --executor=parallel && 
      python manage.py ensure_public_tenant && 
      python manage.py ensure_demo_tenant && 
      python manage.py ensure_demo_users && 
      python manage.py populate_demo_data && 
      echo "Migrations and Demo Data population completed."'
    source_dir: /
