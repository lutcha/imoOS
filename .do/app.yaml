# =============================================================
# ImoOS — DigitalOcean App Platform Spec
# Deploy: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <APP_ID> --spec .do/app.yaml
# =============================================================

name: imos-staging
region: ams

domains:
  - domain: proptech.cv
    type: PRIMARY
  - domain: www.proptech.cv
    type: ALIAS

# ------------------------------------------------------------------
# Web Service — Django API
# ------------------------------------------------------------------
services:
  - name: api
    github:
      repo: lutcha/imoOS
      branch: develop
      deploy_on_push: true
    source_dir: /
    dockerfile_path: docker/Dockerfile.staging
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs

    routes:
      - path: /

    health_check:
      http_path: /api/v1/health/
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 3

    run_command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 120 --log-file -

    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        type: SECRET
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ${APP_DOMAIN},proptech.cv,www.proptech.cv,api.proptech.cv
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: REDIS_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${redis.DATABASE_URL}
      - key: AWS_ACCESS_KEY_ID
        value: ${AWS_ACCESS_KEY_ID}
        type: SECRET
      - key: AWS_SECRET_ACCESS_KEY
        value: ${AWS_SECRET_ACCESS_KEY}
        type: SECRET
      - key: AWS_STORAGE_BUCKET_NAME
        value: imos-staging-media
      - key: AWS_S3_ENDPOINT_URL
        value: https://fra1.digitaloceanspaces.com
      - key: SENTRY_DSN
        value: ${SENTRY_DSN}
        type: SECRET
      - key: APP_VERSION
        value: ${_self.COMMIT_HASH}
      - key: TENANT_BASE_DOMAIN
        value: proptech.cv

# ------------------------------------------------------------------
# Workers — Celery (background, no HTTP port)
# ------------------------------------------------------------------
workers:
  - name: celery-worker
    github:
      repo: lutcha/imoOS
      branch: develop
      deploy_on_push: true
    source_dir: /
    dockerfile_path: docker/Dockerfile.staging
    instance_count: 1
    instance_size_slug: professional-xs
    run_command: celery -A config.celery worker --loglevel=info --concurrency=2
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        type: SECRET
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: REDIS_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${redis.DATABASE_URL}

  - name: celery-beat
    github:
      repo: lutcha/imoOS
      branch: develop
      deploy_on_push: true
    source_dir: /
    dockerfile_path: docker/Dockerfile.staging
    instance_count: 1
    instance_size_slug: basic-xxs
    run_command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        type: SECRET
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: REDIS_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_BROKER_URL
        value: ${redis.DATABASE_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${redis.DATABASE_URL}

# ------------------------------------------------------------------
# Pre-deploy Jobs
# ------------------------------------------------------------------
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: lutcha/imoOS
      branch: develop
    source_dir: /
    dockerfile_path: docker/Dockerfile.staging
    run_command: "bash -c 'python manage.py migrate_schemas --shared && python manage.py migrate_schemas && python manage.py ensure_public_tenant'"
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        type: SECRET
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: ALLOWED_HOSTS
        value: .ondigitalocean.app,proptech.cv,www.proptech.cv,api.proptech.cv
      - key: TENANT_BASE_DOMAIN
        value: proptech.cv
      - key: APP_DOMAIN
        value: ${APP_DOMAIN}
      - key: REDIS_URL
        value: ${redis.DATABASE_URL}

# ------------------------------------------------------------------
# Managed Databases
# PG + Redis provisionados pelo App Platform (sem custo extra em staging).
# ------------------------------------------------------------------
databases:
  - name: db
    engine: PG
    version: "15"
    production: false
  - name: redis
    engine: REDIS
    version: "7"
    production: false
