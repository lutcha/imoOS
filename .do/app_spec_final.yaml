# =============================================================
# ImoOS — DigitalOcean App Spec (FINAL STABILIZED)
# =============================================================
# COPIE ESTE CONTEÚDO INTEGRALMENTE para o painel do DigitalOcean:
# Settings -> App Spec -> Edit -> Substituir tudo e Salvar.
# =============================================================

name: imos-staging
region: fra

domains:
  - domain: proptech.cv
    type: PRIMARY
  - domain: www.proptech.cv
    type: ALIAS
  - domain: demo.proptech.cv
    type: ALIAS

services:
  - name: api
    github:
      repo: lutcha/imoOS
      branch: develop
      deploy_on_push: true
    source_dir: /
    dockerfile_path: docker/Dockerfile.staging
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    routes:
      - path: /
    health_check:
      http_path: /api/v1/health/
      initial_delay_seconds: 60
      period_seconds: 30
    run_command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 120 --log-file -
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        type: SECRET
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: REDIS_URL
        value: ${redis.DATABASE_URL}?ssl_cert_reqs=CERT_NONE
      - key: CELERY_BROKER_URL
        value: ${redis.DATABASE_URL}?ssl_cert_reqs=CERT_NONE
      - key: CELERY_RESULT_BACKEND
        value: django-db

  - name: frontend
    github:
      repo: lutcha/imoOS
      branch: develop
      deploy_on_push: true
    source_dir: frontend
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 3000
    routes:
      - path: /app
    envs:
      - key: NEXT_PUBLIC_API_URL
        value: https://proptech.cv
      - key: NEXT_PUBLIC_TENANT_DOMAIN
        value: demo.proptech.cv
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"

workers:
  - name: celery-worker
    github:
      repo: lutcha/imoOS
      branch: develop
      deploy_on_push: true
    source_dir: /
    dockerfile_path: docker/Dockerfile.staging
    instance_count: 1
    instance_size_slug: professional-xs
    run_command: celery -A config.celery worker --loglevel=info --concurrency=2
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        type: SECRET
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: REDIS_URL
        value: ${redis.DATABASE_URL}?ssl_cert_reqs=CERT_NONE
      - key: CELERY_BROKER_URL
        value: ${redis.DATABASE_URL}?ssl_cert_reqs=CERT_NONE

  - name: celery-beat
    github:
      repo: lutcha/imoOS
      branch: develop
      deploy_on_push: true
    source_dir: /
    dockerfile_path: docker/Dockerfile.staging
    instance_count: 1
    instance_size_slug: basic-xxs
    run_command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        type: SECRET
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: lutcha/imoOS
      branch: develop
    source_dir: /
    dockerfile_path: docker/Dockerfile.staging
    run_command: "bash -c 'python manage.py migrate_schemas --shared && python manage.py migrate_schemas && python manage.py ensure_public_tenant && python manage.py ensure_demo_tenant --schema demo_promotora --name \"Demo Promotora\" --domain demo.proptech.cv --plan pro'"
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.staging
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        type: SECRET
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
        type: SECRET
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}

databases:
  - name: db
    engine: PG
    version: "15"
    production: false
  - name: redis
    engine: VALKEY
    production: true
    cluster_name: imos-redis-staging
