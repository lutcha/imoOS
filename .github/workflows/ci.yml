name: CI Pipeline — ImoOS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  DATABASE_URL: postgres://imos:imos_password@localhost:5432/imos_test
  REDIS_URL: redis://localhost:6379/0
  DJANGO_SETTINGS_MODULE: config.settings.testing
  SECRET_KEY: ci-test-secret-key-not-for-production

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install black flake8 isort
      - run: black --check apps/ config/ tests/
      - run: flake8 apps/ config/ tests/ --max-line-length=120
      - run: isort --check-only apps/ config/ tests/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install bandit safety
      - run: bandit -r apps/ -ll -q
      - run: safety check -r requirements/base.txt

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: imos_test
          POSTGRES_USER: imos
          POSTGRES_PASSWORD: imos_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install GDAL (PostGIS support)
        run: sudo apt-get install -y gdal-bin libgdal-dev
      - name: Install dependencies
        run: pip install -r requirements/development.txt
      - name: Run shared migrations
        run: python manage.py migrate_schemas --shared
      - name: Run unit tests
        run: pytest tests/unit/ tests/integration/ --tb=short -q
      - name: Run coverage
        run: pytest --cov=apps --cov-report=xml --cov-fail-under=80 -q

  isolation-tests:
    name: Tenant Isolation Tests (MANDATORY)
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: imos_test
          POSTGRES_USER: imos
          POSTGRES_PASSWORD: imos_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install GDAL
        run: sudo apt-get install -y gdal-bin libgdal-dev
      - name: Install dependencies
        run: pip install -r requirements/development.txt
      - name: Run migrations
        run: python manage.py migrate_schemas --shared
      - name: Run MANDATORY isolation tests
        run: |
          echo "====================================================="
          echo "  TENANT ISOLATION TESTS — BUILD FAILS IF NOT GREEN  "
          echo "====================================================="
          pytest tests/tenant_isolation/ -v --tb=long -m isolation
        # This job BLOCKS all merges if it fails — no exceptions

  build-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, security-scan, test, isolation-tests]
    steps:
      - run: echo "All CI checks passed. Safe to merge."
